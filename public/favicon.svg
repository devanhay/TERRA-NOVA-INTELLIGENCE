<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7209b7"/>
      <stop offset="100%" stop-color="#4cc9f0"/>
    </linearGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4cc9f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7209b7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#060510"/>
  <!-- Glow -->
  <rect width="32" height="32" rx="8" fill="url(#g2)"/>
  <!-- Hexagon atom ring -->
  <circle cx="16" cy="16" r="10" stroke="url(#g1)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Electron orbit -->
  <ellipse cx="16" cy="16" rx="10" ry="4" stroke="#4cc9f0" stroke-width="0.8" fill="none" opacity="0.4" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="10" ry="4" stroke="#b5179e" stroke-width="0.8" fill="none" opacity="0.4" transform="rotate(-60 16 16)"/>
  <!-- Center nucleus -->
  <circle cx="16" cy="16" r="3" fill="url(#g1)"/>
  <circle cx="16" cy="16" r="1.5" fill="#f8fafc" opacity="0.9"/>
</svg>